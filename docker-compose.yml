services:
  postgres:
    image: postgres:16-alpine
    container_name: fhir-bridge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fhir_bridge
      POSTGRES_USER: fhir
      POSTGRES_PASSWORD: fhir
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fhir -d fhir_bridge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
